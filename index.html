    <!-- Font Awesome -->

    <style>
        /* BASE FONT AND LAYOUT ADJUSTMENTS */
        body, html { margin: 0; padding: 0; overflow: hidden; background-color: #050510; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #root { width: 100vw; height: 100vh; }
        
        /* Custom scrollbar */
        .custom-scroll::-webkit-scrollbar { width: 8px; }
        .custom-scroll::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.1); }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 255, 0.7); 
            border-radius: 4px;
        }
        
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .glass-panel {
            background: rgba(10, 15, 30, 0.85);
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(100, 200, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        /* 3D Label Styles - Using CSS only for fixed pixel size */
        .node-label {
            position: absolute;
            top: 0;
            left: 0;
            color: #00ffff;
            font-size: 14px; /* Fixed size for 3D stability */
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
            transform: translate(-50%, -50%);
            white-space: nowrap;
            transition: opacity 0.3s;
            padding: 6px 10px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 4px;
            border: 1px solid rgba(0, 255, 255, 0.3);
        }

        /* Holographic Image Frame */
        .holo-frame {
            position: relative;
            padding: 4px;
            background: linear-gradient(45deg, transparent 5%, #00ffff 5%, #00ffff 10%, transparent 10%, transparent 90%, #00ffff 90%, #00ffff 95%, transparent 95%);
            border: 1px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
        }
        .holo-frame::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, transparent 40%, rgba(0, 255, 255, 0.4) 50%, transparent 60%);
            background-size: 100% 200%;
            animation: scan 3s linear infinite;
            pointer-events: none;
        }
        @keyframes scan {
            0% { background-position: 0% 200%; }
            100% { background-position: 0% -200%; }
        }
    </style>
</head>
<body>

        // --- RESUME DATA ---
        const PORTFOLIO_DATA = {
            about: {

                icon: "fa-user-astronaut",
                // --- UPDATE IMAGE HERE ---
                image: "IMG_7411.jpg", 
                content: `My name is Vikas A Ram, studying Robotics and Automation Engineering at JSS Academy of Technical Education. I have a strong foundation in designing, implementing, and optimizing automated systems for enhanced efficiency and precision. 
                
                I am enterprising, analytical, and a fast learner, adept at collaborating with cross-functional teams to integrate technology and reduce operational costs. Currently serving as Co-Founder & CTO of Noirs Clothing.\n

                contact: [

                    { type: "Location", value: "Bangalore, Karnataka - 560018", icon: "fa-map-marker-alt" }
                ]
            },
            experience: {

                items: [
                    {

                        year: "2025 - Present",
                        desc: "Launched a D2C clothing brand. Managed product design, manufacturing, and digital marketing strategies. Achieved profitability within 3 months. Cultivated strong customer loyalty and built a recognizable brand identity."
                    },

        };

        // --- 3D SCENE COMPONENT ---
        const ThreeScene = ({ activeSection, onSectionSelect }) => {
            const mountRef = useRef(null);
            const sceneRef = useRef(null);
            const cameraRef = useRef(null);
            const rendererRef = useRef(null);
            const objectsRef = useRef([]);
            const particlesRef = useRef(null);
            const raycaster = useRef(new THREE.Raycaster());
            const mouse = useRef(new THREE.Vector2());
            const labelRefs = useRef({}); 

            const nodes = useMemo(() => [
                { id: 'about', position: [0, 0, 0], color: 0x00ffff, size: 1.5, label: "Me" },
                { id: 'experience', position: [4, 2, 2], color: 0xff0055, size: 1, label: "Experience" },
                { id: 'projects', position: [-4, 3, -2], color: 0x55ff00, size: 1, label: "Projects" },
                { id: 'skills', position: [3, -3, -3], color: 0xffaa00, size: 1, label: "Skills" },
                { id: 'education', position: [-3, -2, 3], color: 0xaa00ff, size: 1, label: "Education" },
                { id: 'leadership', position: [0, 4, 0], color: 0xffaa00, size: 1, label: "Leadership" },
            ], []);

            useEffect(() => {
                const scene = new THREE.Scene();
                scene.fog = new THREE.FogExp2(0x050510, 0.035); 
                sceneRef.current = scene;

                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.z = 12;
                cameraRef.current = camera;

                const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(window.devicePixelRatio);
                mountRef.current.appendChild(renderer.domElement);
                rendererRef.current = renderer;

                const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
                scene.add(ambientLight);
                const pointLight = new THREE.PointLight(0x00ffff, 1.5);
                pointLight.position.set(10, 10, 10);
                scene.add(pointLight);
                const pointLight2 = new THREE.PointLight(0xff0055, 1);
                pointLight2.position.set(-10, -10, -10);
                scene.add(pointLight2);

                const geometry = new THREE.IcosahedronGeometry(1, 1);
                
                nodes.forEach(node => {
                    const material = new THREE.MeshPhongMaterial({ 
                        color: node.color, 
                        shininess: 100,
                        wireframe: true,
                        emissive: node.color,
                        emissiveIntensity: 0.2
                    });
                    
                    const mesh = new THREE.Mesh(geometry, material);
                    mesh.position.set(...node.position);
                    mesh.scale.set(node.size, node.size, node.size);
                    mesh.userData = { id: node.id, originalScale: node.size, label: node.label };
                    
                    const glowGeo = new THREE.SphereGeometry(0.8, 16, 16);
                    const glowMat = new THREE.MeshBasicMaterial({ color: node.color, transparent: true, opacity: 0.3 });
                    const glowMesh = new THREE.Mesh(glowGeo, glowMat);
                    mesh.add(glowMesh);

                    scene.add(mesh);
                    objectsRef.current.push(mesh);
                });

                const lineMaterial = new THREE.LineBasicMaterial({ color: 0x4444ff, transparent: true, opacity: 0.15 });
                const points = nodes.map(n => new THREE.Vector3(...n.position));
                const lineGeometry = new THREE.BufferGeometry().setFromPoints(points);
                
                const indices = [];
                for(let i=0; i<nodes.length; i++) {
                    for(let j=i+1; j<nodes.length; j++) {
                        if (i === 0 || new THREE.Vector3(...nodes[i].position).distanceTo(new THREE.Vector3(...nodes[j].position)) < 8) {
                            indices.push(i, j);
                        }
                    }
                }
                lineGeometry.setIndex(indices);
                const lines = new THREE.LineSegments(lineGeometry, lineMaterial);
                scene.add(lines);

                const particlesGeometry = new THREE.BufferGeometry();
                const particlesCount = 3000;
                const posArray = new Float32Array(particlesCount * 3);
                const sizesArray = new Float32Array(particlesCount);
                
                for(let i = 0; i < particlesCount * 3; i++) {
                    posArray[i] = (Math.random() - 0.5) * 60; 
                    if (i % 3 === 0) sizesArray[i/3] = Math.random();
                }
                
                particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
                particlesGeometry.setAttribute('size', new THREE.BufferAttribute(sizesArray, 1));
                
                const particlesMaterial = new THREE.PointsMaterial({
                    size: 0.05,
                    color: 0xffffff,
                    transparent: true,
                    opacity: 0.8,
                    sizeAttenuation: true
                });
                
                const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
                particlesRef.current = particlesMesh;
                scene.add(particlesMesh);

                const onMouseMove = (event) => {
                    mouse.current.x = (event.clientX / window.innerWidth) * 2 - 1;
                    mouse.current.y = -(event.clientY / window.innerHeight) * 2 + 1;
                };

                const onClick = (event) => {
                    raycaster.current.setFromCamera(mouse.current, camera);
                    const intersects = raycaster.current.intersectObjects(objectsRef.current);
                    
                    if (intersects.length > 0) {
                        const id = intersects[0].object.userData.id;
                        onSectionSelect(id);
                    } else {
                        onSectionSelect(null); 
                    }
                };
                
                const onResize = () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                };

                window.addEventListener('mousemove', onMouseMove);
                window.addEventListener('click', onClick);
                window.addEventListener('resize', onResize);

                let frameId;
                const animate = () => {
                    frameId = requestAnimationFrame(animate);
                    const time = Date.now() * 0.001;

                    objectsRef.current.forEach((obj, i) => {
                        obj.rotation.x += 0.005;
                        obj.rotation.y += 0.005;
                        
                        if (obj.userData.id !== 'about') {
                            obj.position.y += Math.sin(time + i) * 0.002;
                        }
                    });

                    if (particlesRef.current) {
                        particlesRef.current.rotation.y = time * 0.05 + mouse.current.x * 0.1;
                        particlesRef.current.rotation.x = mouse.current.y * 0.1;
                    }

                    raycaster.current.setFromCamera(mouse.current, camera);
                    const intersects = raycaster.current.intersectObjects(objectsRef.current);

                    objectsRef.current.forEach(obj => {
                        const targetScale = obj.userData.originalScale;
                        obj.scale.lerp(new THREE.Vector3(targetScale, targetScale, targetScale), 0.1);
                        obj.material.emissiveIntensity = 0.2;

                        const labelDiv = labelRefs.current[obj.userData.id];
                        if (labelDiv) {
                            const vector = obj.position.clone();
                            vector.project(camera);
                            
                            if (vector.z > 1) {
                                labelDiv.style.display = 'none';
                            } else {
                                labelDiv.style.display = 'block';
                                const x = (vector.x * .5 + .5) * window.innerWidth;
                                const y = (-(vector.y * .5) + .5) * window.innerHeight;
                                labelDiv.style.transform = `translate(-50%, -50%) translate(${x}px, ${y - 40}px)`; 
                            }
                        }
                    });

                    if (intersects.length > 0) {
                        const hoveredObj = intersects[0].object;
                        const targetScale = hoveredObj.userData.originalScale * 1.3;
                        hoveredObj.scale.lerp(new THREE.Vector3(targetScale, targetScale, targetScale), 0.1);
                        hoveredObj.material.emissiveIntensity = 0.8;
                        document.body.style.cursor = 'pointer';
                        
                        const labelDiv = labelRefs.current[hoveredObj.userData.id];
                        if(labelDiv) labelDiv.style.color = '#fff';
                    } else {
                        document.body.style.cursor = 'default';
                         Object.values(labelRefs.current).forEach(el => {
                            if(el) el.style.color = '#00ffff';
                         });
                    }

                    renderer.render(scene, camera);
                };
                animate();

                return () => {
                    window.removeEventListener('mousemove', onMouseMove);
                    window.removeEventListener('click', onClick);
                    window.removeEventListener('resize', onResize);
                    cancelAnimationFrame(frameId);
                    if (mountRef.current) {
                        mountRef.current.removeChild(renderer.domElement);
                    }
                };
            }, [nodes]);

            useEffect(() => {
                if (!cameraRef.current) return;

                let targetPos = new THREE.Vector3(0, 0, 12);
                if (activeSection) {
                    const targetNode = nodes.find(n => n.id === activeSection);
                    if (targetNode) {
                        targetPos = new THREE.Vector3(
                            targetNode.position[0] * 0.8, 
                            targetNode.position[1] * 0.8, 
                            targetNode.position[2] + 4
                        );
                    }
                }

                let animFrame;
                const animateCamera = () => {
                    if (!cameraRef.current) return;
                    cameraRef.current.position.lerp(targetPos, 0.05);
                    cameraRef.current.lookAt(0,0,0);
                    if (cameraRef.current.position.distanceTo(targetPos) > 0.01) {
                        animFrame = requestAnimationFrame(animateCamera);
                    }
                };
                animateCamera();

                return () => cancelAnimationFrame(animFrame);
            }, [activeSection, nodes]);

            return (
                <div className="relative w-full h-full">
                    <div ref={mountRef} className="absolute inset-0 z-0" />
                    {/* Render Labels */}
                    {nodes.map(node => (
                        <div 
                            key={node.id} 
                            ref={el => labelRefs.current[node.id] = el}
                            className="node-label font-mono"
                        >
                            {node.label}
                        </div>
                    ))}
                </div>
            );
        };

        // --- UI OVERLAY COMPONENT ---
        const Overlay = ({ activeSection, onBack }) => {
            const data = activeSection ? PORTFOLIO_DATA[activeSection] : null;

            if (!activeSection) {
                return (
                    <div className="absolute inset-0 z-10 pointer-events-none flex flex-col justify-between p-8">
                        <header className="flex justify-between items-start fade-in">
                            <div>
                                {/* Using MAIN_TITLE_SCALE for fluid responsiveness across all screens */}
                                <h1 className={`${UI_SCALES.MAIN_TITLE_SCALE} font-bold tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-blue-500 to-purple-600 drop-shadow-[0_0_10px_rgba(0,255,255,0.5)]`}>VIKAS A RAM</h1>
                                {/* Using SUBTITLE_SCALE for fluid responsiveness */}
                                <p className={`text-cyan-100 opacity-90 mt-2 ${UI_SCALES.SUBTITLE_SCALE} font-light tracking-widest`}>ROBOTICS AND AUTOMATION ENGINEER | CTO </p>
                            </div>
                            <div className="text-right hidden md:block">
                                <p className={`${UI_SCALES.DETAIL_TEXT_SCALE} text-gray-400 font-mono`}>STATUS: ONLINE</p>
                                <p className={`${UI_SCALES.DETAIL_TEXT_SCALE} text-gray-400 font-mono`}>LOC: BANGALORE, IN</p>
                            </div>
                        </header>
                        
                        <div className="text-center fade-in delay-100">
                            <p className={`${UI_SCALES.DETAIL_TEXT_SCALE} text-cyan-400 animate-pulse tracking-[0.2em] uppercase mb-2`}>Initialize Exploration</p>
                            <p className={`${UI_SCALES.DETAIL_TEXT_SCALE} text-gray-500`}>Drag to Rotate Galaxy • Click Nodes for Data</p>
                        </div>

                        {/* Using ICON_SIZE_MD for fluid social icons */}
                        <footer className={`flex gap-6 ${UI_SCALES.ICON_SIZE_MD} text-gray-400 pointer-events-auto fade-in pb-4`}>
                            {/* --- UPDATE SOCIAL LINKS HERE --- */}
                            
                            {/* 1. Phone */}
                            <a href="tel:+919741279291" className="hover:text-green-400 transition hover:scale-110" title="Call Me"><i className="fas fa-phone"></i></a>
                            
                            {/* 2. Email */}
                            <a href="mailto:vikasaram003@gmail.com" className="hover:text-cyan-400 transition hover:scale-110" title="Email Me"><i className="fas fa-envelope"></i></a>
                            
                            {/* 3. LinkedIn (UPDATE THE HREF) */}
                            <a href="https://www.linkedin.com/in/vikas-a-ram-ba3463313?utm_source=share_via&utm_content=profile&utm_medium=member_android" target="_blank" rel="noopener noreferrer" className="hover:text-blue-500 transition hover:scale-110" title="LinkedIn (Update in Code)"><i className="fab fa-linkedin"></i></a>
                            
                            {/* 4. GitHub (UPDATE THE HREF) */}
                            <a href="https://github.com/Vikas20101" target="_blank" rel="noopener noreferrer" className="hover:text-gray-200 transition hover:scale-110" title="GitHub (Update in Code)"><i className="fab fa-github"></i></a>
                        </footer>
                    </div>
                );
            }

            return (
                <div className="absolute inset-0 z-20 flex items-center justify-center p-4 md:p-8 pointer-events-none">
                    <div className={`glass-panel w-full ${UI_SCALES.MODAL_MAX_WIDTH} ${UI_SCALES.MODAL_MAX_HEIGHT} rounded-xl p-6 md:p-10 pointer-events-auto flex flex-col relative fade-in overflow-hidden`}>
                        
                        {/* Background Decor */}
                        <div className="absolute top-0 right-0 w-32 h-32 bg-cyan-500/10 rounded-full blur-3xl -z-10"></div>
                        <div className="absolute bottom-0 left-0 w-40 h-40 bg-purple-500/10 rounded-full blur-3xl -z-10"></div>

                        <button 
                            onClick={onBack}
                            className={`absolute top-6 right-6 text-cyan-500 hover:text-white transition bg-black/20 hover:bg-red-500/20 ${UI_SCALES.BUTTON_CONTAINER_SIZE} rounded-full flex items-center justify-center border border-cyan-500/30`}
                        >
                            <i className={`fas fa-times ${UI_SCALES.BUTTON_ICON_SIZE}`}></i>
                        </button>

                        {/* Header */}
                        <div className="flex items-center gap-6 mb-8 border-b border-cyan-500/20 pb-6">
                            <div className={`${UI_SCALES.CONTAINER_SIZE_LG} rounded-2xl bg-gradient-to-br from-cyan-900 to-blue-900 flex items-center justify-center shadow-[0_0_20px_rgba(0,255,255,0.2)] border border-cyan-500/50`}>
                                <i className={`fas ${data.icon} ${UI_SCALES.ICON_SIZE_LG} text-cyan-300`}></i>
                            </div>
                            <div>
                                <h2 className={`${UI_SCALES.MODAL_TITLE_SCALE} font-bold text-white tracking-wide`}>{data.title}</h2>
                                <div className="h-1 w-24 bg-gradient-to-r from-cyan-500 to-transparent mt-2 rounded"></div>
                            </div>
                        </div>

                        {/* Content Area */}
                        <div className="overflow-y-auto custom-scroll pr-4 flex-1">
                            
                            {/* ABOUT SECTION LAYOUT */}
                            {activeSection === 'about' && (
                                <div className="flex flex-col md:flex-row gap-8">
                                    <div className="md:w-1/3 flex flex-col items-center">
                                        <div className="w-64 h-64 rounded-lg holo-frame mb-6 overflow-hidden bg-black">
                                            <img src={data.image} alt="Vikas A Ram" className="w-full h-full object-cover opacity-80 hover:opacity-100 transition duration-500" />
                                        </div>
                                        <div className="w-full space-y-4">
                                            {data.contact.map((c, i) => (
                                                <div key={i} className={`flex items-center gap-3 ${UI_SCALES.DETAIL_TEXT_SCALE} text-gray-300 bg-white/5 p-4 rounded border border-white/5 hover:border-cyan-500/30 transition`}>
                                                    <i className={`fas ${c.icon} w-8 text-cyan-400 ${UI_SCALES.ICON_SIZE_SM}`}></i>
                                                    <span className="truncate">{c.value}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="md:w-2/3">
                                        <p className={`text-gray-300 leading-relaxed ${UI_SCALES.BODY_TEXT_SCALE} whitespace-pre-line text-justify`}>
                                            {data.content}
                                        </p>
                                    </div>
                                </div>
                            )}

                            {/* SKILLS LAYOUT */}
                            {activeSection === 'skills' && (
                                <div className="grid grid-cols-2 md:grid-cols-3 gap-6">
                                    {data.list.map((skill, i) => (
                                        <div key={i} className="p-5 rounded-lg bg-gradient-to-br from-white/5 to-white/0 border border-white/10 hover:border-cyan-400/50 transition group cursor-default">
                                            <div className={`text-cyan-400 mb-2 group-hover:scale-110 transition-transform origin-left ${UI_SCALES.ICON_SIZE_SM}`}><i className="fas fa-code"></i></div>
                                            <span className={`text-gray-200 font-medium ${UI_SCALES.DETAIL_TEXT_SCALE}`}>{skill}</span>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {/* GENERIC LIST LAYOUT (Experience, Projects, Education, Leadership) */}
                            {['experience', 'projects', 'education', 'leadership'].includes(activeSection) && (
                                <div className="space-y-8">
                                    {data.items.map((item, i) => (
                                        <div key={i} className="bg-white/5 p-7 rounded-xl hover:bg-white/10 transition border-l-4 border-cyan-500 relative overflow-hidden group">
                                            <div className="absolute top-0 right-0 w-20 h-20 bg-gradient-to-bl from-cyan-500/10 to-transparent opacity-0 group-hover:opacity-100 transition"></div>
                                            
                                            <div className="flex flex-col md:flex-row justify-between md:items-center mb-4">
                                                <h3 className={`font-bold ${UI_SCALES.CARD_TITLE_SCALE} text-cyan-50 group-hover:text-cyan-400 transition`}>{item.role || item.name}</h3>
                                                <span className={`${UI_SCALES.DETAIL_TEXT_SCALE} font-mono text-cyan-300 bg-cyan-900/30 px-3 py-1 rounded-full border border-cyan-500/20 mt-2 md:mt-0 w-fit`}>
                                                    {item.year || item.type}
                                                </span>
                                            </div>
                                            
                                            <p className={`${UI_SCALES.DETAIL_TEXT_SCALE} font-semibold text-gray-300 mb-3 flex items-center gap-2`}>
                                                <i className={`fas fa-building ${UI_SCALES.ICON_SIZE_SM} text-gray-500`}></i>
                                                {item.company || item.degree} 
                                                {item.score && <span className="text-green-400 ml-2">• {item.score}</span>}
                                            </p>
                                            
                                            {item.desc && (
                                                <p className={`text-gray-400 ${UI_SCALES.BODY_TEXT_SCALE} leading-relaxed border-t border-white/5 pt-4 mt-2`}>
                                                    {item.desc}
                                                </p>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                        
                        <div className="mt-8 pt-4 border-t border-white/10 text-center">
                            <button onClick={onBack} className={`${UI_SCALES.DETAIL_TEXT_SCALE} text-cyan-500 hover:text-white transition flex items-center justify-center gap-2 w-full`}>
                                <i className="fas fa-arrow-left"></i> Return to Galaxy Map
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- MAIN APP COMPONENT ---
        const App = () => {
            const [activeSection, setActiveSection] = useState(null);

            return (
                <div className="relative w-full h-full bg-black">
                    <ThreeScene activeSection={activeSection} onSectionSelect={setActiveSection} />
                    <Overlay activeSection={activeSection} onBack={() => setActiveSection(null)} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
